                          - heading "How will “Giants vs. Riders” be resolved?" [level=3] [ref=e893]:
                            - button "How will “Giants vs. Riders” be resolved?" [ref=e894] [cursor=pointer]:
                              - text: How will “Giants vs. Riders” be resolved?
                              - img [ref=e895]
                          - region "How will “Giants vs. Riders” be resolved?":
                            - generic [ref=e897]: The “Giants vs. Riders” market resolves based on the official final score of the Indian Premier League game as reported by Indian Premier League’s official results, including overtime if applicable. Moneyline markets resolve to the team that wins the game. Spread markets resolve based on the final margin of victory relative to the posted line. Totals (over/under) markets resolve based on the combined final score of both teams. Player prop markets resolve based on official box score statistics. If the game is postponed or canceled, the market resolution rules (available in the Rules section on this page) specify how that scenario is handled. We recommend reviewing the full resolution criteria before trading.
