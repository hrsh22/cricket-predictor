                          - region "How much trading activity has “Giants vs. Riders” generated on Polymarket?":
                            - generic [ref=e879]: As of now, the “Giants vs. Riders” market has generated $3 million in total trading volume across all market types (moneyline, spreads, totals, and player props). This volume reflects active engagement from the Polymarket trading community, and a deeper pool of traders generally means more informative, reliable odds. You can track live price movements and trade on any market directly on this page.
                        - generic [ref=e880]:
                          - heading "How do I trade on “Giants vs. Riders”?" [level=3] [ref=e881]:
                            - button "How do I trade on “Giants vs. Riders”?" [ref=e882] [cursor=pointer]:
                              - text: How do I trade on “Giants vs. Riders”?
                              - img [ref=e883]
                          - region "How do I trade on “Giants vs. Riders”?":
                            - generic [ref=e885]: "To trade on “Giants vs. Riders,” start by choosing the market type you want to trade: Moneyline (which team wins), Spreads (margin of victory), Totals (combined score over/under), or Player Props (individual player stat lines). Each market shows the current price for each side — for example, the moneyline shows LUC at 100¢ and KOL at 0¢. Select the side you want to trade, choose Buy to take a position or Sell to close an existing one, enter your amount, and click Trade. If your chosen side is correct when the game ends and the market resolves, your shares pay out $1 each. If it’s incorrect, they pay out $0. You can also sell your shares at any time before the game ends to lock in a profit or cut a loss."
                        - generic [ref=e886]:
                          - heading "What are the current odds for “Giants vs. Riders”?" [level=3] [ref=e887]:
                            - button "What are the current odds for “Giants vs. Riders”?" [ref=e888] [cursor=pointer]:
