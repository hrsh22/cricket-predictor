                          - region "What is the “Giants vs. Riders” prediction market?":
                            - generic [ref=e873]: The “Giants vs. Riders” market on Polymarket lets you trade on the outcome of the Indian Premier League game between the Lucknow Super Giants and the Kolkata Knight Riders, scheduled for April 9, 2026 at 10:00 AM ET. The primary market is the moneyline — which team will win the game — where Giants is currently priced at 100¢ (100% implied probability) and Riders at 0¢ (0%). Beyond the moneyline, sports markets on Polymarket may feature spreads, totals (over/under), and player props, giving you multiple ways to trade on this game. Prices reflect real-time crowd-sourced probabilities. Shares in the correct outcome pay out $1 each when the market resolves after the game ends.
                        - generic [ref=e874]:
                          - heading "How much trading activity has “Giants vs. Riders” generated on Polymarket?" [level=3] [ref=e875]:
                            - button "How much trading activity has “Giants vs. Riders” generated on Polymarket?" [ref=e876] [cursor=pointer]:
