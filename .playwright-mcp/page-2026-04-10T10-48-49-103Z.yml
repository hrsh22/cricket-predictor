                  - generic [ref=e463]: This market refers to which team's player records the highest individual run total in the cricket match between Kolkata Knight Riders and Lucknow Super Giants scheduled for 2026-04-09 in Indian Premier League. This market resolves according to the finalized match statistics as published by https://www.espncricinfo.com/. The outcome corresponding to Kolkata Knight Riders will be considered correct if the highest individual score in the match is recorded exclusively by a player from Kolkata Knight Riders. The outcome corresponding to Lucknow Super Giants will be considered correct if the highest individual score is recorded exclusively by a player from Lucknow Super Giants. If the highest individual score is shared by at least one player from each team, the market will resolve to Draw. The market will resolve according to which team's player records the highest individual run total regardless of if the match is not competed (e.g. Due to weather conditions). DLS/DRS adjustments and any other on-field rulings affecting batting statistics are treated as ordinary data. If the match is permanently canceled, abandoned, or otherwise completed without official batting statistics being recorded, the market will resolve Draw. If the match is postponed or rescheduled, the market remains open until the listed fixture is completed and official statistics are available.
                  - generic [ref=e464]: This market refers to which team hits the greater number of sixes in the cricket match between Kolkata Knight Riders and Lucknow Super Giants scheduled for 2026-04-09 in Indian Premier League. This market resolves according to the finalized match statistics as published by https://www.espncricinfo.com/. The outcome corresponding to Kolkata Knight Riders will be considered correct if Kolkata Knight Riders is officially recorded as hitting more sixes than Lucknow Super Giants.The outcome corresponding to Lucknow Super Giants will be considered correct if Lucknow Super Giants is officially recorded as hitting more sixes than Kolkata Knight Riders. If both teams record the same number of sixes, the market will resolve to "Draw". The market will resolve according to the team that hits the greater number of sixes in the match regardless of if the match is not competed (e.g. Due to weather conditions)/ Only sixes scored from the bat (off any delivery- legal or not) will count towards the total sixes. Overthrows and extras do not count. Sixes scored in a super over do not count. In First Class games, only first innings sixes will count. If the match is permanently canceled, abandoned, or otherwise completed without official sixes statistics being recorded, the market will resolve "Draw". If the match is postponed or rescheduled, the market remains open until the listed fixture is completed and official statistics are available.
                  - generic [ref=e465]: This market refers to the combination of the pre-match coin toss and the final match result for the cricket match between Kolkata Knight Riders and Lucknow Super Giants scheduled for 2026-04-09 in Indian Premier League. This market resolves according to (1) the official toss result and (2) the finalized match result as published by https://www.espncricinfo.com/. The outcome corresponding to Kolkata Knight Riders will be considered correct if Kolkata Knight Riders is officially recorded as winning both the toss and the match. The outcome corresponding to Lucknow Super Giants will be considered correct if Lucknow Super Giants is officially recorded as winning both the toss and the match. In all other cases - including where the toss and match winners differ, or where no match winner is recorded - the market will resolve to Neither. DLS/DRS adjustments, over-rate penalties, forfeit/walkover, Super Over, or any other on-field ruling that leads the competition to declare a match winner are treated as ordinary wins. If the match ends tied and the playing conditions provide an on-field tiebreak (e.g., Super Over), the tiebreak winner will be considered the match winner for this market. If the match ends tied with no tiebreak used or available, no team will be considered to have won the match and the market will resolve to Neither. If the match is permanently canceled, abandoned, or otherwise completed without an official match winner being declared, the market will resolve to Neither. If the match is postponed or rescheduled, the market remains open until the listed fixture is completed and will then resolve as described above.
                  - generic [ref=e466]: This market refers to the cricket match between Kolkata Knight Riders and Lucknow Super Giants scheduled for April 9 2026 in Indian Premier League. This market resolves according to the finalized match result as published by https://www.espncricinfo.com/. DLS/DRS, over-rate penalties, forfeit/walkover, or any other on-field ruling that leads the competition to declare a winner are treated as ordinary wins. If the match ends tied and the playing conditions provide an on-field tiebreak (e.g., Super Over), the winner determined by that tiebreak will be used for resolution. If the match ends tied and no on-field tiebreak is used or available under the playing conditions (e.g., group-stage ODI with no Super Over), the market will resolve 50-50. If the match is postponed/rescheduled, the market remains open until the listed fixture is completed. If the match is permanently canceled or abandoned or otherwise is completed without a winner, the market resolves 50-50. The primary resolution source for this market is the official statistics of the event as recognized by the governing body or event organizers. However, if the governing body or event organizers have not published final match statistics within 2 hours after the event's conclusion, a consensus of credible reporting may be used instead.
                  - generic [ref=e467]: This market refers to the pre-match coin toss for the cricket match between Kolkata Knight Riders and Lucknow Super Giants scheduled for 2026-04-09 in Indian Premier League. This market resolves according to the official coin toss result (the team recorded as having won the toss) as published by https://www.espncricinfo.com/. If an official toss winner is recorded, the market will resolve based on that result even if the match is subsequently delayed, relocated, abandoned, or no ball is bowled. If the match is postponed or rescheduled, the market will remain open and resolve according to the toss result for the listed fixture when it is eventually played. If the fixture is permanently canceled, forfeited before any toss is conducted, or otherwise completed without an official toss winner being recorded, the market will resolve 50-50.
                  - generic [ref=e468]: This market refers to whether the cricket match between Kolkata Knight Riders and Lucknow Super Giants scheduled for 2026-04-09 in Indian Premier League is completed under the competition's official playing conditions. This market resolves according to the finalized match status as published by https://www.espncricinfo.com/. Any match where an official result is declared — including results decided by DLS/DRS, over-rate penalties, a Super Over, forfeit/walkover, or any other on-field ruling — will resolve Yes. (Draws count as completed results when recognized by the competition.) If the match is abandoned, ends in No Result, is permanently canceled, or otherwise concludes without an official result, the market will resolve No. If the match is postponed or rescheduled, the market remains open until the listed fixture is completed or permanently canceled, after which it will resolve as described above.
                  - generic [ref=e469]: Lucknow Super Giants enter this IPL clash at Eden Gardens as favorites against a winless Kolkata Knight Riders, who sit near the bottom of the points table after two losses and a no-result, hampered by injuries to spinner Varun Chakravarthy (hand) and Sunil Narine's recent illness recovery. KKR's top order, led by captain Ajinkya Rahane, faces pressure amid bowling struggles, while LSG's potent pace attack featuring Mohammed Shami and Avesh Khan exploits early swing on the batting-friendly pitch, where dew often aids chasing—LSG won the toss and opted to bowl first. KKR's home advantage and returning Narine provide upset potential in a must-win for their campaign momentum.
