                              - text: Mukul falls down to the turf. He thanks the heavens. And he then gets mobbed by his LSG teammates. What a moment for the youngster. This was a short ball outside off. Mukul, for a change, swung and missed, but Avesh, famously part of another such thriller while batting once upon a time in Bengaluru, scrambles across with every sinew. Raghuvanshi took a split second extra to line up his throw but missed his mark. KKR do not know what has hit them. KKR do not know where to look. But they only need to look at that youngster wearing number 15 in red and blue, and that is who denied KKR. And based on today's evidence, they might not be the only side he denies in the IPL!
